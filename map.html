<!DOCTYPE html>
<html>
<head>
  <title>CareVision Directions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { 
      font-family: Arial, sans-serif; 
      padding: 20px;
      background: #020617;
      color: white;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
    }
    h2 {
      color: #22c55e;
      margin-bottom: 20px;
    }
    p {
      color: #94a3b8;
      margin-bottom: 30px;
    }
    button {
      padding: 15px 30px;
      background: linear-gradient(135deg, #22c55e, #3b82f6);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      transition: 0.3s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(34,197,94,0.3);
    }
    .back-btn {
      margin-top: 30px;
      background: linear-gradient(135deg, #64748b, #475569);
      font-size: 16px;
    }
    .info-box {
      background: rgba(15,23,42,0.8);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 16px;
      padding: 30px;
      margin-top: 30px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="info-box">
    <h2>CareVision Center - Kolhapur</h2>
    <p>Click the button below to get directions from your current location to the hospital:</p>

    <button onclick="goToGoogleMaps()">Get Directions</button>
    <br>
    <button class="back-btn" onclick="window.location.href='/dashboard'">← Back to Dashboard</button>
  </div>
</div>

<script>
function goToGoogleMaps() {
    if(navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            var userLat = position.coords.latitude;
            var userLon = position.coords.longitude;

            // CareVision Center Kolhapur coordinates
            var destLat = 16.6956;  // Kolhapur latitude
            var destLon = 74.2295;  // Kolhapur longitude

            // Google Maps directions URL
            var url = `https://www.google.com/maps/dir/?api=1&origin=${userLat},${userLon}&destination=${destLat},${destLon}&travelmode=driving`;
            
            window.open(url, "_blank");  // Opens in new tab/app
        }, function() {
            alert("Unable to get your location. Please allow location access.");
        });
    } else {
        alert("Geolocation not supported by your browser");
    }
}
</script>

</body>
</html>
